<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 服务管理控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --border: #475569;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --get: #22c55e;
            --post: #3b82f6;
            --put: #f59e0b;
            --delete: #ef4444;
            --patch: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1f3a 100%);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-nav {
            max-width: 1600px;
            margin: 0 auto;
            padding-top: 0.75rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-tabs {
            display: flex;
            gap: 0.25rem;
            background: transparent;
            border-bottom: none;
        }

        .nav-tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab:hover {
            color: var(--text);
            background: var(--bg-hover);
        }

        .nav-tab.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary);
        }

        .nav-tab-content {
            display: none;
        }

        .nav-tab-content.active {
            display: block;
        }

        .key-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .key-card:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .key-card.default {
            border-color: var(--secondary);
            background: rgba(16, 185, 129, 0.05);
        }

        .key-info {
            flex: 1;
        }

        .key-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .key-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            background: var(--secondary);
            color: white;
            font-weight: 600;
        }

        .key-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .key-date {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        .key-actions {
            display: flex;
            gap: 0.5rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: monospace;
            resize: vertical;
            min-height: 150px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .btn-sm {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .empty-state-small {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }

        .json-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .json-tab {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .json-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .service-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.25rem 0;
            margin-bottom: 0.5rem;
        }

        .service-list-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: var(--primary-dark);
        }

        .keys-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .keys-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .keys-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 80px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
            flex: 1;
        }

        .service-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .service-card.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, var(--bg-card) 100%);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .service-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .service-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
        }

        .service-badges {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-get { background: rgba(34, 197, 94, 0.2); color: var(--get); }
        .badge-post { background: rgba(59, 130, 246, 0.2); color: var(--post); }
        .badge-put { background: rgba(245, 158, 11, 0.2); color: var(--put); }
        .badge-delete { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-patch { background: rgba(139, 92, 246, 0.2); color: var(--patch); }
        .badge-auth { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }

        .service-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .service-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .service-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .tag-list {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .main-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .detail-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .detail-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 1.5rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .info-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.9rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-value code {
            background: rgba(99, 102, 241, 0.15);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            color: var(--primary-light);
            font-size: 0.85rem;
            word-break: break-all;
            flex: 1;
            overflow-wrap: break-word;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 0.25rem;
            margin-bottom: 0.25rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            gap: 0.25rem;
        }

        .tab {
            padding: 1rem 1.25rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary);
        }

        .tab-count {
            background: var(--bg-hover);
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        .tool-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .tool-header {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tool-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .method-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 60px;
            text-align: center;
        }

        .method-GET { background: rgba(34, 197, 94, 0.2); color: var(--get); }
        .method-POST { background: rgba(59, 130, 246, 0.2); color: var(--post); }
        .method-PUT { background: rgba(245, 158, 11, 0.2); color: var(--put); }
        .method-DELETE { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .method-PATCH { background: rgba(139, 92, 246, 0.2); color: var(--patch); }

        .tool-path {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--text);
        }

        .tool-name {
            font-weight: 600;
            color: var(--primary-light);
            margin-left: auto;
        }

        .tool-expand-icon {
            color: var(--text-dim);
            transition: transform 0.2s;
        }

        .tool-item.expanded .tool-expand-icon {
            transform: rotate(180deg);
        }

        .tool-body {
            display: none;
            padding: 0 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .tool-item.expanded .tool-body {
            display: block;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 1rem 0;
            padding: 0.75rem;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1rem 0 0.5rem;
        }

        .params-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .params-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            background: var(--bg-card);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .params-table td {
            padding: 0.6rem 0.75rem;
            border-top: 1px solid var(--border);
        }

        .param-name {
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: var(--text);
            font-weight: 500;
        }

        .param-type {
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: var(--info);
            font-size: 0.8rem;
        }

        .param-required {
            color: var(--danger);
            font-size: 0.7rem;
            font-weight: 600;
        }

        .param-optional {
            color: var(--text-dim);
            font-size: 0.7rem;
        }

        .param-desc {
            color: var(--text-muted);
        }

        .location-badge {
            font-size: 0.65rem;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            background: rgba(100, 116, 139, 0.3);
            color: var(--text-muted);
        }

        .schema-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        .resource-item, .prompt-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }

        .resource-name, .prompt-name {
            font-weight: 600;
            color: var(--secondary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            margin-bottom: 0.35rem;
        }

        .resource-uri {
            font-size: 0.8rem;
            color: var(--primary-light);
            font-family: 'SF Mono', 'Fira Code', monospace;
            margin-bottom: 0.5rem;
        }

        .resource-desc, .prompt-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .instructions-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .copy-btn {
            background: rgba(99, 102, 241, 0.15);
            border: none;
            color: var(--primary-light);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.3);
        }

        .test-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .test-type-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .test-type-tab {
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .test-type-tab:hover {
            background: var(--sidebar-hover);
            color: var(--text-color);
        }
        .test-type-tab.active {
            background: var(--accent-color);
            color: white;
        }
        .test-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .test-selector select {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .test-selector select:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .test-params-section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }
        .test-params-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .param-editor {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .param-row {
            display: grid;
            grid-template-columns: 140px 1fr auto;
            gap: 10px;
            align-items: center;
        }
        .param-row label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }
        .param-row input, .param-row select {
            padding: 6px 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.85rem;
        }
        .param-row input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .param-required-mark {
            color: #ff6b6b;
            margin-left: 4px;
        }
        .raw-json-editor {
            width: 100%;
            min-height: 120px;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            resize: vertical;
        }
        .test-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--sidebar-hover);
        }
        .test-result {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .test-result-header {
            padding: 12px 16px;
            background: rgba(139, 92, 246, 0.1);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-result-status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .status-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .status-loading {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
        }
        .test-result-body {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-text {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            font-size: 0.85rem;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        .result-markdown h1, .result-markdown h2, .result-markdown h3 {
            margin: 16px 0 8px 0;
            color: var(--text-color);
        }
        .result-markdown h1 { font-size: 1.3rem; }
        .result-markdown h2 { font-size: 1.1rem; }
        .result-markdown h3 { font-size: 1rem; }
        .result-markdown p { margin: 8px 0; }
        .result-markdown ul, .result-markdown ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        .result-markdown li { margin: 4px 0; }
        .result-markdown code {
            background: var(--bg-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .result-markdown strong {
            color: var(--accent-color);
        }

        @media (max-width: 1100px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🔌</div>
                <div>
                    <div>MCP 服务管理控制台</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 400;">Model Context Protocol Services</div>
                </div>
            </div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-value" id="statServices">-</div>
                    <div class="stat-label">服务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statTools">-</div>
                    <div class="stat-label">工具</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statResources">-</div>
                    <div class="stat-label">资源</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statPrompts">-</div>
                    <div class="stat-label">提示词</div>
                </div>
            </div>
        </div>
        <div class="header-nav">
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchNavTab('services')">📋 服务管理</button>
                <button class="nav-tab" onclick="switchNavTab('tokens')">🔑 Token 管理</button>
            </div>
        </div>
    </div>

    <div id="tab-services" class="nav-tab-content active">
        <div class="container">
            <div class="sidebar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索MCP服务...">
                </div>
                <div class="service-list-header">
                    <span class="service-list-title">服务列表</span>
                    <button class="btn-icon" onclick="openAddServiceModal()" title="添加服务">+</button>
                </div>
                <div class="service-list" id="serviceList">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>

            <div class="main-content" id="mainContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <h2 style="margin-bottom: 0.5rem; color: var(--text);">选择一个MCP服务</h2>
                    <p>从左侧列表中选择一个服务查看详细配置</p>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-tokens" class="nav-tab-content">
        <div class="keys-container">
            <div class="keys-header">
                <div class="keys-title">🔑 Token 管理</div>
                <button class="btn btn-primary" onclick="openAddTokenModal()">+ 新增 Token</button>
            </div>
            <div id="keysList">
                <div class="empty-state-small">加载中...</div>
            </div>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script>
        let services = [];
        let selectedService = null;
        let activeTab = 'tools';
        let expandedTools = new Set();
        let apiKeys = [];
        let selectedKeyId = null;
        let currentTab = 'services';

        const methodColors = {
            GET: 'get',
            POST: 'post',
            PUT: 'put',
            DELETE: 'delete',
            PATCH: 'patch'
        };

        function switchNavTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab-content').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            
            if (tab === 'tokens') {
                fetchKeys();
            }
        }

        async function fetchKeys() {
            try {
                const res = await fetch('/api/keys');
                const data = await res.json();
                apiKeys = data.keys;
                renderKeysList();
            } catch (e) {
                document.getElementById('keysList').innerHTML = `
                    <div class="empty-state-small">加载失败: ${e.message}</div>
                `;
            }
        }

        function renderKeysList() {
            const container = document.getElementById('keysList');
            if (apiKeys.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-small">
                        <div style="font-size: 2rem; margin-bottom: 0.5rem;">🔑</div>
                        <p>暂无 API Token，点击右上角新增</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = apiKeys.map(key => `
                <div class="key-card ${key.is_default ? 'default' : ''}">
                    <div class="key-info">
                        <div class="key-name">
                            ${key.name}
                            ${key.is_default ? '<span class="key-badge">默认</span>' : ''}
                        </div>
                        <div class="key-value">${key.key_prefix}</div>
                        <div class="key-date">创建于 ${new Date(key.created_at).toLocaleString('zh-CN')}</div>
                    </div>
                    <div class="key-actions">
                        ${!key.is_default ? `<button class="btn btn-secondary btn-sm" onclick="setDefaultKey('${key.id}')">设为默认</button>` : ''}
                        <button class="btn btn-secondary btn-sm" onclick="openEditTokenModal('${key.id}')">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteKey('${key.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddTokenModal() {
            const html = `
                <div class="modal-overlay" onclick="closeModal(event)">
                    <div class="modal" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-title">新增 API Token</div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Token 名称</label>
                                <input type="text" class="form-input" id="newKeyName" placeholder="例如：生产环境Token">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Token 值（留空自动生成）</label>
                                <input type="text" class="form-input" id="newKeyValue" placeholder="留空将自动生成随机Token">
                            </div>
                            <div class="form-group">
                                <label class="form-checkbox">
                                    <input type="checkbox" id="newKeyDefault">
                                    <span>设为默认 Token</span>
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                            <button class="btn btn-primary" onclick="createKey()">创建</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = html;
        }

        async function createKey() {
            const name = document.getElementById('newKeyName').value.trim();
            const key = document.getElementById('newKeyValue').value.trim();
            const isDefault = document.getElementById('newKeyDefault').checked;

            if (!name) {
                alert('请输入Token名称');
                return;
            }

            try {
                const res = await fetch('/api/keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, key, is_default: isDefault })
                });
                const data = await res.json();
                if (data.success) {
                    alert(`Token创建成功！\n\nToken: ${data.key.key}\n\n请妥善保存，只显示一次！`);
                    closeModal();
                    fetchKeys();
                    loadKeysForTest();
                } else {
                    alert('创建失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }

        let _editingKeyId = null;

        function openEditTokenModal(keyId) {
            const key = apiKeys.find(k => k.id === keyId);
            if (!key) return;
            _editingKeyId = keyId;

            const html = `
                <div class="modal-overlay" onclick="closeModal(event)">
                    <div class="modal" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-title">编辑 API Token</div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Token 名称</label>
                                <input type="text" class="form-input" id="editKeyName" value="${key.name}" placeholder="例如：生产环境Token">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Token 前缀</label>
                                <input type="text" class="form-input" value="${key.key_prefix}" disabled>
                                <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 4px;">Token 本身不可修改，只能修改名称</div>
                            </div>
                            <div class="form-group">
                                <label class="form-checkbox">
                                    <input type="checkbox" id="editKeyDefault" ${key.is_default ? 'checked' : ''}>
                                    <span>设为默认 Token</span>
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                            <button class="btn btn-primary" onclick="updateKey()">保存</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = html;
        }

        async function updateKey() {
            const name = document.getElementById('editKeyName').value.trim();
            const isDefault = document.getElementById('editKeyDefault').checked;

            if (!name) {
                alert('请输入Token名称');
                return;
            }

            try {
                const res = await fetch(`/api/keys/${_editingKeyId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, is_default: isDefault })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    fetchKeys();
                    loadKeysForTest();
                } else {
                    alert('更新失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('更新失败: ' + e.message);
            }
        }

        async function setDefaultKey(keyId) {
            try {
                const res = await fetch(`/api/keys/${keyId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_default: true })
                });
                const data = await res.json();
                if (data.success) {
                    fetchKeys();
                } else {
                    alert('设置失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('设置失败: ' + e.message);
            }
        }

        async function deleteKey(keyId) {
            if (!confirm('确定要删除这个Key吗？')) return;
            try {
                const res = await fetch(`/api/keys/${keyId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    fetchKeys();
                } else {
                    alert('删除失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        function openAddServiceModal() {
            const html = `
                <div class="modal-overlay" onclick="closeModal(event)">
                    <div class="modal" onclick="event.stopPropagation()" style="max-width: 700px;">
                        <div class="modal-header">
                            <div class="modal-title">新增 MCP 服务</div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="json-tabs">
                                <button class="json-tab active" id="tabForm" onclick="switchServiceFormTab('form')">📝 表单方式</button>
                                <button class="json-tab" id="tabJson" onclick="switchServiceFormTab('json')">📄 JSON 方式</button>
                            </div>
                            
                            <div id="serviceFormPanel">
                                <div class="form-group">
                                    <label class="form-label">服务名称 *</label>
                                    <input type="text" class="form-input" id="svcName" placeholder="例如：my-mcp-service">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">服务描述 *</label>
                                    <input type="text" class="form-input" id="svcDesc" placeholder="服务功能描述">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">MCP 地址 *</label>
                                    <input type="text" class="form-input" id="svcUrl" placeholder="https://example.com/mcp">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">传输方式</label>
                                        <select class="form-input" id="svcTransport">
                                            <option value="streamable-http">streamable-http</option>
                                            <option value="stdio">stdio</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">认证方式</label>
                                        <select class="form-input" id="svcAuthType">
                                            <option value="">无认证</option>
                                            <option value="Bearer Token">Bearer Token</option>
                                            <option value="API Key">API Key</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">系统提示词 (Instructions)</label>
                                    <textarea class="form-textarea" id="svcInstructions" placeholder="AI助手的角色定义和使用说明..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">标签（逗号分隔）</label>
                                    <input type="text" class="form-input" id="svcTags" placeholder="示例,工具,生产">
                                </div>
                                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="loadServiceExample()">📋 加载示例</button>
                                </div>
                            </div>
                            
                            <div id="serviceJsonPanel" style="display:none;">
                                <div style="margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-size: 0.85rem; color: var(--text-muted);">粘贴完整的服务定义JSON：</span>
                                    <button class="btn btn-secondary btn-sm" onclick="loadServiceExample()">📋 加载示例</button>
                                </div>
                                <textarea class="form-textarea" id="svcJson" style="min-height: 350px;" placeholder='{"name": "...", "description": "...", ...}'></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                            <button class="btn btn-primary" onclick="createService()">创建服务</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = html;
        }

        function switchServiceFormTab(tab) {
            document.getElementById('tabForm').classList.toggle('active', tab === 'form');
            document.getElementById('tabJson').classList.toggle('active', tab === 'json');
            document.getElementById('serviceFormPanel').style.display = tab === 'form' ? 'block' : 'none';
            document.getElementById('serviceJsonPanel').style.display = tab === 'json' ? 'block' : 'none';
        }

        async function loadServiceExample() {
            try {
                const res = await fetch('/api/services/example/sample');
                const data = await res.json();
                const jsonStr = JSON.stringify(data, null, 2);
                
                if (document.getElementById('svcJson')) {
                    document.getElementById('svcJson').value = jsonStr;
                }
                if (document.getElementById('svcName')) {
                    document.getElementById('svcName').value = data.name;
                    document.getElementById('svcDesc').value = data.description;
                    document.getElementById('svcUrl').value = data.base_url;
                    document.getElementById('svcTransport').value = data.transport;
                    document.getElementById('svcAuthType').value = data.auth_type || '';
                    document.getElementById('svcInstructions').value = data.instructions || '';
                    document.getElementById('svcTags').value = (data.tags || []).join(', ');
                }
            } catch (e) {
                alert('加载示例失败: ' + e.message);
            }
        }

        async function createService() {
            let serviceData;
            
            const jsonTabActive = document.getElementById('tabJson').classList.contains('active');
            
            if (jsonTabActive) {
                try {
                    serviceData = JSON.parse(document.getElementById('svcJson').value);
                } catch (e) {
                    alert('JSON格式错误: ' + e.message);
                    return;
                }
            } else {
                const name = document.getElementById('svcName').value.trim();
                const description = document.getElementById('svcDesc').value.trim();
                const base_url = document.getElementById('svcUrl').value.trim();
                const transport = document.getElementById('svcTransport').value;
                const auth_type = document.getElementById('svcAuthType').value || null;
                const instructions = document.getElementById('svcInstructions').value.trim() || null;
                const tags = document.getElementById('svcTags').value.split(',').map(t => t.trim()).filter(Boolean);

                if (!name || !description || !base_url) {
                    alert('请填写必填项（名称、描述、地址）');
                    return;
                }

                serviceData = {
                    name,
                    description,
                    base_url,
                    transport,
                    auth_type,
                    instructions,
                    tags,
                    tools: [],
                    resources: [],
                    prompts: []
                };
            }

            try {
                const res = await fetch('/api/services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(serviceData)
                });
                const data = await res.json();
                if (data.success) {
                    alert('服务创建成功！');
                    closeModal();
                    fetchServices();
                } else {
                    alert('创建失败: ' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modalContainer').innerHTML = '';
        }

        async function fetchServices() {
            try {
                const res = await fetch('/api/services');
                const data = await res.json();
                services = data.services;
                updateStats(data);
                renderServiceList();
                if (services.length > 0 && !selectedService) {
                    selectService(services[0].name);
                }
            } catch (e) {
                document.getElementById('serviceList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>加载失败: ${e.message}</p>
                    </div>
                `;
            }
        }

        function updateStats(data) {
            const totalTools = data.services.reduce((sum, s) => sum + s.tools.length, 0);
            const totalResources = data.services.reduce((sum, s) => sum + s.resources.length, 0);
            const totalPrompts = data.services.reduce((sum, s) => sum + s.prompts.length, 0);

            document.getElementById('statServices').textContent = data.total;
            document.getElementById('statTools').textContent = totalTools;
            document.getElementById('statResources').textContent = totalResources;
            document.getElementById('statPrompts').textContent = totalPrompts;
        }

        function renderServiceList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = services.filter(s =>
                s.name.toLowerCase().includes(searchTerm) ||
                s.description.toLowerCase().includes(searchTerm) ||
                s.tags.some(t => t.toLowerCase().includes(searchTerm))
            );

            const html = filtered.map(service => `
                <div class="service-card ${selectedService === service.name ? 'active' : ''}"
                     onclick="selectService('${service.name}')">
                    <div class="service-card-header">
                        <div class="service-name">${service.name}</div>
                        <div class="service-badges">
                            <span class="badge badge-${methodColors[service.tools[0]?.method] || 'get'}">${service.tools.length} 工具</span>
                            ${service.has_auth ? '<span class="badge badge-auth">🔐</span>' : ''}
                        </div>
                    </div>
                    <div class="service-desc">${service.description}</div>
                    <div class="service-meta">
                        <span>🔧 ${service.tools.length} 工具</span>
                        <span>📦 ${service.resources.length} 资源</span>
                        <span>💬 ${service.prompts.length} 提示词</span>
                    </div>
                    ${service.tags.length > 0 ? `
                        <div class="tag-list">
                            ${service.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');

            document.getElementById('serviceList').innerHTML = html || `
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <p>未找到匹配的服务</p>
                </div>
            `;
        }

        function selectService(name) {
            selectedService = name;
            activeTab = 'tools';
            expandedTools.clear();
            renderServiceList();
            renderServiceDetail();
        }

        function renderServiceDetail() {
            const service = services.find(s => s.name === selectedService);
            if (!service) return;

            document.getElementById('mainContent').innerHTML = `
                <div class="detail-header">
                    <div class="detail-title">
                        ${service.name}
                        ${service.has_auth ? '<span class="badge badge-auth" style="margin-left: 0.5rem; font-size: 0.75rem;">🔐 需要认证</span>' : ''}
                    </div>
                    <div class="detail-desc">${service.description}</div>
                    <div class="detail-info-grid">
                        <div class="info-item">
                            <span class="info-label">MCP 地址</span>
                            <span class="info-value" title="${service.base_url}">
                                <code>${service.base_url}</code>
                                <button class="copy-btn" onclick="copyToClipboard('${service.base_url}')" title="复制地址">📋</button>
                            </span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">传输方式</span>
                            <span class="info-value"><code>${service.transport}</code></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">认证方式</span>
                            <span class="info-value">${service.auth_type || '<span style="color: var(--text-dim);">无</span>'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">标签</span>
                            <span class="info-value">${service.tags.map(t => `<span class="tag">${t}</span>`).join(' ') || '<span style="color: var(--text-dim);">无</span>'}</span>
                        </div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab ${activeTab === 'tools' ? 'active' : ''}" onclick="switchTab('tools')">
                        🔧 工具 <span class="tab-count">${service.tools.length}</span>
                    </button>
                    <button class="tab ${activeTab === 'resources' ? 'active' : ''}" onclick="switchTab('resources')">
                        📦 资源 <span class="tab-count">${service.resources.length}</span>
                    </button>
                    <button class="tab ${activeTab === 'prompts' ? 'active' : ''}" onclick="switchTab('prompts')">
                        💬 提示词 <span class="tab-count">${service.prompts.length}</span>
                    </button>
                    <button class="tab ${activeTab === 'test' ? 'active' : ''}" onclick="switchTab('test')">
                        🧪 请求测试
                    </button>
                    <button class="tab ${activeTab === 'config' ? 'active' : ''}" onclick="switchTab('config')">
                        ⚙️ 配置
                    </button>
                </div>

                <div class="tab-content" id="tabContent">
                    ${renderTabContent(service)}
                </div>
            `;
        }

        function switchTab(tab) {
            activeTab = tab;
            renderServiceDetail();
        }

        function toggleTool(toolName) {
            if (expandedTools.has(toolName)) {
                expandedTools.delete(toolName);
            } else {
                expandedTools.add(toolName);
            }
            renderServiceDetail();
        }

        function renderTabContent(service) {
            switch (activeTab) {
                case 'tools':
                    return renderTools(service.tools);
                case 'resources':
                    return renderResources(service.resources);
                case 'prompts':
                    return renderPrompts(service.prompts);
                case 'test':
                    return renderTestPanel(service);
                case 'config':
                    return renderConfig(service);
                default:
                    return '';
            }
        }

        function renderTools(tools) {
            return tools.map(tool => {
                const isExpanded = expandedTools.has(tool.name);
                return `
                    <div class="tool-item ${isExpanded ? 'expanded' : ''}">
                        <div class="tool-header" onclick="toggleTool('${tool.name}')">
                            <span class="method-badge method-${tool.method}">${tool.method}</span>
                            <span class="tool-path">${tool.path}</span>
                            <span class="tool-name">${tool.name}</span>
                            <span class="tool-expand-icon">▼</span>
                        </div>
                        <div class="tool-body">
                            <div class="tool-desc">${tool.description}</div>

                            <div class="section-title">参数列表</div>
                            ${tool.parameters.length > 0 ? `
                                <table class="params-table">
                                    <thead>
                                        <tr>
                                            <th>参数名</th>
                                            <th>位置</th>
                                            <th>类型</th>
                                            <th>必填</th>
                                            <th>说明</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tool.parameters.map(p => `
                                            <tr>
                                                <td><span class="param-name">${p.name}</span></td>
                                                <td><span class="location-badge">${p.location || 'body'}</span></td>
                                                <td><span class="param-type">${p.type}</span></td>
                                                <td>${p.required ? '<span class="param-required">必填</span>' : '<span class="param-optional">可选</span>'}</td>
                                                <td class="param-desc">${p.description}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            ` : '<p style="color: var(--text-dim); font-size: 0.85rem;">此工具无需参数</p>'}

                            <div class="section-title">输入 Schema (JSON Schema)</div>
                            <div class="schema-box">${JSON.stringify(tool.input_schema, null, 2)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderResources(resources) {
            if (resources.length === 0) {
                return '<div class="empty-state"><p>此服务暂无资源</p></div>';
            }
            return resources.map(res => `
                <div class="resource-item">
                    <div class="resource-name">📄 ${res.name}</div>
                    <div class="resource-uri">${res.uri}</div>
                    <div class="resource-desc">${res.description || '无描述'}</div>
                </div>
            `).join('');
        }

        function renderPrompts(prompts) {
            if (prompts.length === 0) {
                return '<div class="empty-state"><p>此服务暂无提示词模板</p></div>';
            }
            return prompts.map(p => `
                <div class="prompt-item">
                    <div class="prompt-name">💬 ${p.name}</div>
                    <div class="prompt-desc">${p.description || '无描述'}</div>
                </div>
            `).join('');
        }

        function renderConfig(service) {
            const configObj = {
                name: service.name,
                description: service.description,
                base_url: service.base_url,
                transport: service.transport,
                has_auth: service.has_auth,
                auth_type: service.auth_type,
                tags: service.tags,
                tools_count: service.tools.length,
                resources_count: service.resources.length,
                prompts_count: service.prompts.length,
            };
            const configJson = JSON.stringify(configObj, null, 2);
            return `
                <div class="section-title">服务配置 (JSON)</div>
                <div class="schema-box" style="position: relative;">
                    <button class="copy-btn" style="position: absolute; top: 0.75rem; right: 0.75rem;" onclick="copyConfig()">📋 复制</button>
                    <pre style="margin: 0; padding: 0;"><code>${escapeHtml(configJson)}</code></pre>
                </div>

                <div class="section-title" style="margin-top: 1.5rem;">AI 助手系统提示词 (Instructions)</div>
                <div class="instructions-box">${service.instructions || '未配置系统提示词'}</div>
            `;
        }

        function copyConfig() {
            const service = services.find(s => s.name === selectedService);
            if (service) {
                navigator.clipboard.writeText(JSON.stringify(service, null, 2));
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.textContent;
                btn.textContent = '✅';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        // ============================================================
        // 🔬 MCP请求测试工具
        // ============================================================
        let testType = 'tool'; // tool | resource | prompt
        let selectedTestItem = '';
        let testResult = null;
        let testLoading = false;
        let lastCurlCommand = '';
        let authToken = '';
        let selectedTestKeyId = '';

        async function loadKeysForTest() {
            try {
                const res = await fetch('/api/keys');
                const data = await res.json();
                apiKeys = data.keys;
                const defaultKey = apiKeys.find(k => k.is_default);
                if (defaultKey) {
                    selectedTestKeyId = defaultKey.id;
                }
            } catch (e) {
                console.warn('Failed to load keys for test:', e);
            }
        }

        function switchTestType(type) {
            testType = type;
            selectedTestItem = '';
            testResult = null;
            renderServiceDetail();
        }

        function renderTestPanel(service) {
            const items = getTestItems(service);
            const currentItem = getCurrentTestItem(service);

            const keyOptions = (apiKeys || []).map(k => `
                <option value="${k.id}" ${selectedTestKeyId === k.id ? 'selected' : ''}>
                    ${k.name}${k.is_default ? ' (默认)' : ''} - ${k.key_prefix}
                </option>
            `).join('');

            return `
                <div class="test-panel">
                    <div class="test-type-tabs">
                        <button class="test-type-tab ${testType === 'tool' ? 'active' : ''}" onclick="switchTestType('tool')">
                            🔧 调用工具
                        </button>
                        <button class="test-type-tab ${testType === 'resource' ? 'active' : ''}" onclick="switchTestType('resource')">
                            📦 读取资源
                        </button>
                        <button class="test-type-tab ${testType === 'prompt' ? 'active' : ''}" onclick="switchTestType('prompt')">
                            💬 获取提示词
                        </button>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px;">
                            🔐 认证 Token（Bearer Token）
                        </div>
                        <select onchange="onSelectTestKey(this.value)" style="width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem;">
                            <option value="">-- 不使用 Token --</option>
                            ${keyOptions}
                        </select>
                        <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 6px;">
                            选择已注册的 Token，将作为 Bearer Token 添加到请求头 Authorization
                        </div>
                    </div>

                    <div class="test-selector">
                        <select onchange="onSelectTestItem(this.value)">
                            <option value="">-- 选择${getTestTypeLabel()} --</option>
                            ${items.map(item => `
                                <option value="${item.value}" ${selectedTestItem === item.value ? 'selected' : ''}>
                                    ${item.label}
                                </option>
                            `).join('')}
                        </select>
                    </div>

                    ${selectedTestItem ? `
                        <div class="test-params-section">
                            <div class="test-params-title">
                                <span>参数配置</span>
                                <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 0.8rem;" onclick="toggleRawJson()">
                                    ${showRawJson ? '可视化编辑' : '原始JSON'}
                                </button>
                            </div>
                            ${renderTestParamsEditor(currentItem)}
                        </div>

                        <div class="test-actions">
                            <button class="btn btn-primary" ${testLoading ? 'disabled' : ''} onclick="runTest()">
                                ${testLoading ? '请求中...' : '🚀 发送请求'}
                            </button>
                            <button class="btn btn-secondary" onclick="resetTest()">重置</button>
                        </div>
                    ` : `
                        <div class="empty-state">
                            <p>请从上方选择一个${getTestTypeLabel()}开始测试</p>
                        </div>
                    `}

                    ${testResult ? renderTestResult() : ''}
                </div>
            `;
        }

        let showRawJson = false;
        let paramValues = {};

        function toggleRawJson() {
            showRawJson = !showRawJson;
            renderServiceDetail();
        }

        function getTestTypeLabel() {
            return { tool: '工具', resource: '资源', prompt: '提示词' }[testType];
        }

        function getTestItems(service) {
            if (testType === 'tool') {
                return service.tools.map(t => ({ value: t.name, label: `${t.method} - ${t.name}` }));
            } else if (testType === 'resource') {
                return service.resources.map(r => ({ value: r.uri, label: r.name }));
            } else {
                return service.prompts.map(p => ({ value: p.name, label: p.name }));
            }
        }

        function getCurrentTestItem(service) {
            if (testType === 'tool') {
                return service.tools.find(t => t.name === selectedTestItem);
            } else if (testType === 'resource') {
                return service.resources.find(r => r.uri === selectedTestItem);
            } else {
                return service.prompts.find(p => p.name === selectedTestItem);
            }
        }

        function onSelectTestKey(value) {
            selectedTestKeyId = value;
            testResult = null;
            renderServiceDetail();
        }

        function onSelectTestItem(value) {
            selectedTestItem = value;
            paramValues = {};
            testResult = null;
            showRawJson = false;
            renderServiceDetail();
        }

        function renderTestParamsEditor(item) {
            if (!item) return '';

            if (testType === 'resource') {
                return '<p style="color: var(--text-dim); font-size: 0.85rem;">资源读取无需参数</p>';
            }

            const params = testType === 'tool' ? (item.parameters || []) : (item.arguments || []);

            if (params.length === 0) {
                return '<p style="color: var(--text-dim); font-size: 0.85rem;">此' + getTestTypeLabel() + '无需参数</p>';
            }

            if (showRawJson) {
                const json = JSON.stringify(paramValues, null, 2);
                return `
                    <textarea class="raw-json-editor" id="rawJsonEditor" onchange="onRawJsonChange(this.value)">${json}</textarea>
                `;
            }

            return `
                <div class="param-editor">
                    ${params.map(p => {
                        const val = paramValues[p.name] !== undefined ? paramValues[p.name] : (p.default || '');
                        const isBool = p.type === 'boolean';
                        const isArray = p.type === 'array' || p.type === 'list';
                        return `
                            <div class="param-row">
                                <label>${p.name}${p.required ? '<span class="param-required-mark">*</span>' : ''}
                                    <br><span style="font-size: 0.75rem; color: var(--text-dim);">${p.type || 'string'}</span>
                                </label>
                                ${isBool ? `
                                    <select onchange="onParamChange('${p.name}', this.value === 'true')">
                                        <option value="false" ${val === false ? 'selected' : ''}>false</option>
                                        <option value="true" ${val === true ? 'selected' : ''}>true</option>
                                    </select>
                                ` : isArray ? `
                                    <input type="text" value="${Array.isArray(val) ? val.join(', ') : val}"
                                        placeholder="逗号分隔多个值"
                                        onchange="onParamChange('${p.name}', this.value.split(',').map(s => s.trim()).filter(Boolean))">
                                ` : `
                                    <input type="text" value="${val}" placeholder="${p.description || ''}"
                                        onchange="onParamChange('${p.name}', this.value)">
                                `}
                                <span style="font-size: 0.75rem; color: var(--text-dim); width: 100px; text-align: right;">
                                    ${p.location || ''}
                                </span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function onParamChange(name, value) {
            paramValues[name] = value;
        }

        function onRawJsonChange(value) {
            try {
                paramValues = JSON.parse(value);
            } catch (e) {
                // 解析失败时保留原值
            }
        }

        function onAuthTokenChange(value) {
            authToken = value;
        }

        function toggleTokenVisibility() {
            const input = document.getElementById('authTokenInput');
            if (input) {
                input.type = input.type === 'password' ? 'text' : 'password';
            }
        }

        function generateMcpCurl(mcpUrl, method, params) {
            const sessionId = 'test-session-' + Math.random().toString(36).substring(2, 10);
            const requestBody = {
                jsonrpc: "2.0",
                id: 1,
                method: method,
                params: params
            };
            const authHeader = authToken ? `-H "Authorization: Bearer ${authToken}" \\\n` : '';
            return `curl -X POST "${mcpUrl}?sessionId=${sessionId}" \\
${authHeader}  -H "Accept: application/json, text/event-stream" \\
  -H "Content-Type: application/json" \\
  -d '${JSON.stringify(requestBody, null, 2).replace(/'/g, "'\\''")}'`;
        }

        async function runTest() {
            const service = services.find(s => s.name === selectedService);
            if (!service || !selectedTestItem) return;

            testLoading = true;
            testResult = null;
            lastCurlCommand = '';
            renderServiceDetail();

            try {
                let endpoint = '';
                let body = {};
                let mcpMethod = '';
                let mcpParams = {};

                if (testType === 'tool') {
                    endpoint = '/api/test/tool';
                    body = {
                        service_name: service.name,
                        tool_name: selectedTestItem,
                        arguments: paramValues,
                    };
                    if (selectedTestKeyId) {
                        body.key_id = selectedTestKeyId;
                    }
                    mcpMethod = 'tools/call';
                    mcpParams = {
                        name: selectedTestItem,
                        arguments: paramValues
                    };
                } else if (testType === 'resource') {
                    endpoint = '/api/test/resource';
                    body = {
                        service_name: service.name,
                        uri: selectedTestItem,
                    };
                    if (selectedTestKeyId) {
                        body.key_id = selectedTestKeyId;
                    }
                    mcpMethod = 'resources/read';
                    mcpParams = {
                        uri: selectedTestItem
                    };
                } else {
                    endpoint = '/api/test/prompt';
                    body = {
                        service_name: service.name,
                        prompt_name: selectedTestItem,
                        arguments: paramValues,
                    };
                    if (selectedTestKeyId) {
                        body.key_id = selectedTestKeyId;
                    }
                    mcpMethod = 'prompts/get';
                    mcpParams = {
                        name: selectedTestItem,
                        arguments: paramValues
                    };
                }

                const headers = { 'Content-Type': 'application/json' };
                if (authToken) {
                    headers['Authorization'] = `Bearer ${authToken}`;
                }
