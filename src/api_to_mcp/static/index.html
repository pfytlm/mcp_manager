                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(body),
                });

                const data = await response.json();
                testResult = data;

                if (data.curl_command) {
                    lastCurlCommand = data.curl_command;
                } else if (data.mcp_url) {
                    lastCurlCommand = generateMcpCurl(data.mcp_url, mcpMethod, mcpParams);
                }
            } catch (error) {
                testResult = { success: false, error: error.message };
            }

            testLoading = false;
            renderServiceDetail();
        }

        function resetTest() {
            paramValues = {};
            testResult = null;
            selectedTestItem = '';
            renderServiceDetail();
        }

        function renderTestResult() {
            if (!testResult) return '';

            const isSuccess = testResult.success;
            const resultData = testResult.result;
            const isMarkdown = typeof resultData === 'string' && (
                resultData.includes('# ') ||
                resultData.includes('## ') ||
                resultData.includes('- ') ||
                resultData.includes('**')
            );

            return `
                ${lastCurlCommand ? `
                    <div class="test-result" style="margin-bottom: 16px;">
                        <div class="test-result-header" style="background: rgba(16, 185, 129, 0.1);">
                            <span>📋 MCP CURL 命令</span>
                            <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 0.8rem;" onclick="copyCurlCommand()">
                                📋 复制
                            </button>
                        </div>
                        <div class="test-result-body">
                            <pre class="result-text" style="color: var(--secondary);">${escapeHtml(lastCurlCommand)}</pre>
                        </div>
                    </div>
                ` : ''}

                <div class="test-result">
                    <div class="test-result-header">
                        <span>响应结果</span>
                        <span class="test-result-status ${isSuccess ? 'status-success' : 'status-error'}">
                            ${isSuccess ? '✅ 成功' : '❌ 失败'}
                        </span>
                    </div>
                    <div class="test-result-body">
                        ${isSuccess && isMarkdown ? `
                            <div class="result-markdown">${simpleMarkdown(resultData)}</div>
                        ` : `
                            <pre class="result-text">${escapeHtml(typeof testResult.result === 'string' ? testResult.result : (testResult.error || JSON.stringify(testResult, null, 2)))}</pre>
                        `}
                    </div>
                </div>
            `;
        }

        function copyCurlCommand() {
            if (lastCurlCommand) {
                navigator.clipboard.writeText(lastCurlCommand);
                alert('CURL命令已复制到剪贴板！');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function simpleMarkdown(text) {
            let html = escapeHtml(text)
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');

            // 处理列表
            const lines = html.split('\n');
            let inUl = false;
            let result = [];

            for (let line of lines) {
                if (/^[-*] /.test(line)) {
                    if (!inUl) { result.push('<ul>'); inUl = true; }
                    result.push('<li>' + line.replace(/^[-*] /, '') + '</li>');
                } else {
                    if (inUl) { result.push('</ul>'); inUl = false; }
                    if (line.trim()) result.push('<p>' + line + '</p>');
                }
            }
            if (inUl) result.push('</ul>');

            return result.join('\n');
        }

        document.getElementById('searchInput').addEventListener('input', renderServiceList);
        fetchServices();
        loadKeysForTest();
    </script>
</body>
</html>
